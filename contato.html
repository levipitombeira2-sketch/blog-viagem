<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Contato</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/estilo.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand"
            href="index.html">

            Meu Blog de Viagens
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1>Contato</h1>

        <form>

            <div class="mb-3">

                <label class="form-label">
                    Nome
                </label>

                <input type="text"
                    class="form-control"
                    placeholder="Digite seu nome">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input type="email"
                    class="form-control"
                    placeholder="Digite seu email">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Mensagem
                </label>

                <textarea class="form-control"
                    rows="5"
                    placeholder="Digite sua mensagem">
                </textarea>

            </div>

            <button class="btn btn-primary">
                Enviar
            </button>

        </form>

        <br>

        <a href="index.html"
            class="btn btn-secondary">

            Voltar
        </a>

    </div>

</div>

</body>
</html>

</body>
</html>
